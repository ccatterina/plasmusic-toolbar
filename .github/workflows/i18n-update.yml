name: I18n Post-Merge Update

on:
  push:
    branches:
      - main
    paths:
      - 'src/contents/**/*.qml'

jobs:
  update-translations:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Check if translations are outdated
        id: check-translations
        run: |
          if ! ./bin/i18n check; then
            echo "outdated=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract translations
        if: ${{ steps.check-translations.outputs.outdated == 'true' }}
        run: |
          ./bin/i18n extract

      - name: Create PR
        if: ${{ steps.check-translations.outputs.outdated == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain src/translate/)" ]; then
            echo "No changes found."
            exit 0
          fi

          git checkout -b i18n/auto-update-bot
          git add src/translate/
          git commit -m "chore(i18n): update translations"
          git push origin i18n/auto-update-bot --force

          gh pr create \
            --fill \
            --label "automated" \
            --body "This PR was automatically generated by the i18n update workflow to keep translations up to date." \
            || echo "PR already exists or failed to create."